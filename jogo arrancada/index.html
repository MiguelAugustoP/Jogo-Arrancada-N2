<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrancada 2D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
    <h1>ARRANCADA</h1>

    <div class="distance-selector">
        <h3>Escolha a distância</h3>

        <select id="distanceSelect">
            <option value="200">200 metros</option>
            <option value="400" selected>400 metros</option>
            <option value="800">800 metros</option>
        </select>

        <button id="startBtn">Iniciar Corrida</button>
        <h3>Controles Para o desktop</h3>
        <p>Player 1: A para acelerar</p>
        <p>Player 2: L para acelerar</p>
    </div>
</div>

<div id="countdownOverlay">

    <div id="trafficLight">

        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>

    </div>

    <h1 id="countdownText">Preparar</h1>

</div>

<div id="camera">

    <div id="track">

        <div id="trackMarks"></div>

        <div class="lane lane1">
            <div id="car1" class="car">
                <img src="imagens/Mcqueen-azul-png.png" alt="">
            </div>
        </div>

        <div class="lane lane2">
            <div id="car2" class="car">
                <img src="imagens/Mcqueen_png.png" alt="">
            </div>
        </div>

        <div id="finishLine">
            <div class="finish-text">
                CHEGADA
            </div>
        </div>

    </div>

</div>

<div id="controls">

    <button id="btnP1" class="touchBtn">
        PLAYER 1
    </button>

    <button id="btnP2" class="touchBtn">
        PLAYER 2
    </button>

</div>

<div id="resultScreen">

    <div class="result-box">

        <h1>Resultado</h1>

        <h2 id="winnerText"></h2>

        <p>Tempo Final: <span id="finalTime"></span></p>

        <p>Velocidade Máxima Player 1:
            <span id="maxSpeed1"></span>
        </p>

        <p>Velocidade Máxima Player 2:
            <span id="maxSpeed2"></span>
        </p>

        <button id="restartBtn">
            Correr Novamente
        </button>

        <button id="menuBtn">
            Voltar ao Menu
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
